<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scott & Jos — 20 Years ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #f0e6d3;
    overflow: hidden;
    position: relative;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(120, 60, 80, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(60, 40, 100, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(140, 80, 60, 0.2) 0%, transparent 50%);
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { opacity: 0.8; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.1); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
  }

  .hearts {
    font-size: 1.5rem;
    letter-spacing: 0.5rem;
    margin-bottom: 1rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #f0e6d3, #e8b88a, #d4956a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 300;
    color: rgba(240, 230, 211, 0.7);
    margin-bottom: 2.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .countdown {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .countdown-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 90px;
  }

  .countdown-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 700;
    line-height: 1;
    color: #f0e6d3;
    text-shadow: 0 0 40px rgba(232, 184, 138, 0.3);
    transition: transform 0.3s ease;
  }

  .countdown-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240, 230, 211, 0.5);
    margin-top: 0.5rem;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232, 184, 138, 0.4), transparent);
    margin: 0 auto 1.5rem;
  }

  .date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: rgba(240, 230, 211, 0.8);
    margin-bottom: 0.5rem;
  }

  .venue {
    font-size: 0.9rem;
    color: rgba(240, 230, 211, 0.45);
    letter-spacing: 0.1em;
  }

  .venue a {
    color: rgba(232, 184, 138, 0.6);
    text-decoration: none;
    border-bottom: 1px solid rgba(232, 184, 138, 0.2);
    transition: all 0.3s;
  }

  .venue a:hover {
    color: rgba(232, 184, 138, 0.9);
    border-bottom-color: rgba(232, 184, 138, 0.5);
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: rgba(232, 184, 138, 0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .milestone {
    margin-top: 2rem;
    padding: 1rem 2rem;
    border: 1px solid rgba(232, 184, 138, 0.15);
    border-radius: 12px;
    background: rgba(232, 184, 138, 0.05);
    font-size: 0.85rem;
    color: rgba(240, 230, 211, 0.6);
    backdrop-filter: blur(10px);
  }

  .milestone strong {
    color: rgba(232, 184, 138, 0.9);
  }
</style>
</head>
<body>

<div class="container">
  <div class="hearts">❤️ ❤️ ❤️</div>
  <h1>Scott & Jos</h1>
  <p class="subtitle">Twenty Years Together</p>

  <div class="countdown" id="countdown">
    <div class="countdown-unit">
      <span class="countdown-number" id="days">---</span>
      <span class="countdown-label">Days</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="hours">--</span>
      <span class="countdown-label">Hours</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="minutes">--</span>
      <span class="countdown-label">Minutes</span>
    </div>
    <div class="countdown-unit">
      <span class="countdown-number" id="seconds">--</span>
      <span class="countdown-label">Seconds</span>
    </div>
  </div>

  <div class="divider"></div>

  <p class="date">June 27, 2026</p>
  <p class="venue">Vow Renewal · <a href="https://www.brookfieldzoo.org" target="_blank">Brookfield Zoo</a></p>

  <div class="milestone" id="milestone"></div>
</div>

<script>
  const target = new Date('2026-06-27T17:00:00-05:00'); // 5pm CDT (Chicago)

  function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '🎉';
      document.getElementById('hours').textContent = '';
      document.getElementById('minutes').textContent = '';
      document.getElementById('seconds').textContent = '';
      document.querySelector('.subtitle').textContent = 'Today is the day!';
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById('days').textContent = days;
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

    // Fun milestone messages
    const totalDays = Math.ceil(diff / 86400000);
    const el = document.getElementById('milestone');
    if (totalDays === 100) el.innerHTML = '🎯 <strong>100 days to go!</strong> Triple digits!';
    else if (totalDays <= 7) el.innerHTML = '🔥 <strong>This week!</strong> Final countdown!';
    else if (totalDays <= 30) el.innerHTML = '📅 <strong>Less than a month!</strong> Getting real!';
    else if (totalDays <= 60) el.innerHTML = '⏳ <strong>Under 60 days</strong> — time to finalize plans';
    else if (totalDays <= 90) el.innerHTML = '💫 <strong>' + totalDays + ' days</strong> — the home stretch begins';
    else el.innerHTML = '✨ <strong>' + totalDays + ' days</strong> until you celebrate 20 incredible years';
  }

  update();
  setInterval(update, 1000);

  // Create floating particles
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.opacity = Math.random() * 0.4 + 0.1;
    p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
    p.style.animation = `float${i % 3} ${Math.random() * 15 + 10}s ease-in-out infinite`;
    document.body.appendChild(p);
  }

  // Add float keyframes dynamically
  const style = document.createElement('style');
  style.textContent = `
    @keyframes float0 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-40px); } }
    @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-25px,35px); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,25px); } }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
